services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - /Users/martin/Projects/JobOS/scouting:/data/scouting
      - /Users/martin/Projects/JobOS/context:/data/context:ro
    environment:
      - N8N_SECURE_COOKIE=false
      - N8N_RESTRICT_FILE_ACCESS_TO=/data/
volumes:
  n8n_data:
