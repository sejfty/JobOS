<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CV — {{name}}</title>
<style>
  @page {
    size: A4;
    margin: 42px 56px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
    font-size: 9pt;
    line-height: 1.5;
    color: #2d2d2d;
    background: #fff;
    padding: 0;
    max-width: 210mm;
    margin: 0 auto;
  }

  :root { --accent: #374151; --subtle: #6B7280; --rule: #D1D5DB; --highlight: #F3F4F6; }

  /* Header */
  .header {
    margin-bottom: 14px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--accent);
  }
  .header h1 {
    font-size: 22pt;
    font-weight: 700;
    color: #111;
    letter-spacing: -0.01em;
    margin-bottom: 5px;
  }
  .contact {
    font-size: 8.5pt;
    color: var(--subtle);
    line-height: 1.55;
  }
  .contact a { color: var(--accent); text-decoration: none; }
  .contact span + span::before {
    content: " · ";
    color: var(--rule);
  }

  /* Summary */
  .summary {
    margin-bottom: 16px;
    padding: 10px 14px;
    background: var(--highlight);
    border-left: 3px solid var(--accent);
    font-size: 9pt;
    color: #374151;
    line-height: 1.5;
  }

  /* Section */
  .section { margin-bottom: 18px; }
  .section-title {
    font-size: 9pt;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--accent);
    margin-bottom: 8px;
    padding-bottom: 2px;
    border-bottom: 1px solid var(--rule);
  }

  /* Job - single column, ATS-safe */
  .job {
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid #f0f0f0;
  }
  .job:last-child { border-bottom: none; padding-bottom: 0; }
  .job-title-line {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1px;
  }
  .job-title {
    font-weight: 700;
    font-size: 9.5pt;
    color: #111;
  }
  .job-dates {
    font-size: 8pt;
    color: var(--subtle);
    font-weight: 500;
    white-space: nowrap;
  }
  .job-company {
    font-size: 8.5pt;
    color: var(--subtle);
    margin-bottom: 3px;
  }
  .job ul {
    list-style: none;
    padding: 0;
  }
  .job li {
    padding-left: 10px;
    position: relative;
    margin-bottom: 3px;
    font-size: 8.5pt;
    line-height: 1.45;
  }
  .job li::before {
    content: "▸";
    position: absolute;
    left: 0;
    color: #9CA3AF;
    font-size: 7pt;
    top: 1px;
  }

  /* Skills */
  .skills-row {
    margin-bottom: 4px;
    font-size: 8.5pt;
    line-height: 1.45;
  }
  .skills-label {
    font-weight: 700;
    color: var(--accent);
    font-size: 8pt;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .skills-value {
    color: #444;
  }

  /* Education */
  .edu-item {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 3px;
    font-size: 8.5pt;
  }
  .edu-left { }
  .edu-name { font-weight: 600; color: #222; }
  .edu-school { color: #666; }
  .edu-dates {
    color: var(--subtle);
    font-size: 8pt;
    font-weight: 500;
    white-space: nowrap;
  }

  /* Print */
  @media print {
    body { padding: 0; }
    .job-title-line { break-inside: avoid; break-after: avoid; }
    .job-company { break-after: avoid; }
    .summary { background: var(--highlight) !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>{{name}}</h1>
  <div class="contact">
    {{contact_items}}
  </div>
</div>

<div class="summary">
  {{summary}}
</div>

<div class="section" id="personal-project" style="display:none">
  <div class="section-title">Personal Project (in progress)</div>
  {{personal_project_blocks}}
</div>

<div class="section">
  <div class="section-title">Experience</div>
  {{experience_blocks}}
</div>

<script>
  // Only show personal project section if it has content
  var pp = document.getElementById('personal-project');
  if (pp && pp.querySelector('.job')) { pp.style.display = ''; }
</script>

<div class="section">
  <div class="section-title">Skills</div>
  {{skills_blocks}}
</div>

<div class="section">
  <div class="section-title">Education</div>
  {{education_blocks}}
</div>

</body>
</html>
